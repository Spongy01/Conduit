services:
  gateway:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://conduit:postgres_conduit@postgres:5432/conduit
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - otel-collector

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: postgres_conduit
      POSTGRES_DB: conduit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conduit -d conduit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
  
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"
    depends_on:
      - tempo
  
  tempo:
    image: grafana/tempo:latest
    ports:
      - "3200:3200"
    volumes:
      - ./tempo-config.yml:/etc/tempo/config.yml
    command: ["-config.file=/etc/tempo/config.yml"]

  dummy-openai:
    build:
      context: ..
      dockerfile: infra/dummy-provider/Dockerfile
    profiles: ["dummy"]
    environment:
      DUMMY_APP: tests.dummy_providers.openai_dummy:app
      DUMMY_PORT: "8001"
    ports:
      - "8001:8001"

  dummy-anthropic:
    build:
      context: ..
      dockerfile: infra/dummy-provider/Dockerfile
    profiles: ["dummy"]
    environment:
      DUMMY_APP: tests.dummy_providers.anthropic_dummy:app
      DUMMY_PORT: "8002"
    ports:
      - "8002:8002"

  dummy-ollama:
    build:
      context: ..
      dockerfile: infra/dummy-provider/Dockerfile
    profiles: ["dummy"]
    environment:
      DUMMY_APP: tests.dummy_providers.ollama_dummy:app
      DUMMY_PORT: "8003"
    ports:
      - "8003:8003"

  seed:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    profiles: ["seed"]
    environment:
      TEST_DATABASE_URL: postgresql://conduit:postgres_conduit@postgres:5432/conduit
    volumes:
      - ../tests/seed_db.py:/app/tests/seed_db.py:ro
    command: ["python", "tests/seed_db.py"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  locust:
    image: locustio/locust
    profiles: ["locust"]
    volumes:
      - ../tests/loadtest:/mnt/locust
    command: ["-f", "/mnt/locust/locustfile.py", "--host", "http://gateway:8000"]
    ports:
      - "8089:8089"
    depends_on:
      - gateway

volumes:
  postgres_data:
